<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ogre Summer Runner</title>
    <style>
        body { margin: 0; background: #fdf5e6; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #game-container { position: relative; width: 100vw; height: 100vh; max-width: 500px; max-height: 900px; overflow: hidden; border: 4px solid #d2691e; }
        canvas { display: block; width: 100%; height: 100%; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 28px; font-weight: 900; pointer-events: none; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui">SCORE: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    canvas.width = 1080;
    canvas.height = 1920;

    const ogreFiles = [
        '0_Ogre_Running_001.png', '0_Ogre_Running_002.png', '0_Ogre_Running_003.png',
        '0_Ogre_Running_004.png', '0_Ogre_Running_005.png', '0_Ogre_Running_006.png',
        '0_Ogre_Running_007.png', '0_Ogre_Running_008.png', '0_Ogre_Running_009.png',
        '0_Ogre_Running_010.png'
    ];
    
    const ogreImages = [];
    let imagesLoaded = 0;

    let player = {
        x: 100, y: 1200, w: 500, h: 500,
        visualOffsetY: 85, 
        dy: 0, jumpForce: -40, gravity: 1.8,
        groundY: 1650, onGround: false,
        scaleX: 1, scaleY: 1,
        frame: 0, animTimer: 0, animSpeed: 4
    };

    let score = 0;
    let gameSpeed = 20;

    function loadAssets() {
        ogreFiles.forEach((src, index) => {
            const img = new Image();
            img.src = src;
            img.onload = () => {
                ogreImages[index] = img;
                imagesLoaded++;
                if (imagesLoaded === ogreFiles.length) gameLoop();
            };
        });
    }

    function update() {
        score += gameSpeed / 30;
        document.getElementById('score').innerText = Math.floor(score);

        player.dy += player.gravity;
        player.y += player.dy;

        if (player.y + player.h - player.visualOffsetY > player.groundY) {
            if (!player.onGround) {
                player.scaleX = 1.12; player.scaleY = 0.88;
            }
            player.y = player.groundY - player.h + player.visualOffsetY;
            player.dy = 0;
            player.onGround = true;
        } else {
            player.onGround = false;
        }

        if (!player.onGround) {
            player.scaleY = 1 + Math.abs(player.dy) * 0.005;
            player.scaleX = 1 / player.scaleY;
        } else {
            player.scaleX += (1 - player.scaleX) * 0.15;
            player.scaleY += (1 - player.scaleY) * 0.15;
            player.animTimer++;
            if (player.animTimer >= player.animSpeed) {
                player.frame = (player.frame + 1) % ogreImages.length;
                player.animTimer = 0;
            }
        }
    }

    function draw() {
        // REVISI: SUMMER GRADIENT BACKGROUND
        let bgGrad = ctx.createLinearGradient(0, 0, 0, player.groundY);
        bgGrad.addColorStop(0, "#2980b9"); // Biru Langit Siang
        bgGrad.addColorStop(0.6, "#6dd5fa"); // Biru Muda Cerah
        bgGrad.addColorStop(1, "#ffa07a"); // Light Salmon / Peach
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // REVISI: PATH WARNA TANAH
        ctx.fillStyle = "#a0522d"; // Sienna / Warna Tanah
        ctx.fillRect(0, player.groundY, canvas.width, canvas.height - player.groundY);
        
        // Tekstur Path (Garis-garis tanah lebih gelap)
        ctx.fillStyle = "#8b4513";
        for(let i=0; i<8; i++) {
            let tx = (Date.now() * (gameSpeed/10) + (i * 400)) % (canvas.width + 400) - 200;
            ctx.fillRect(tx, player.groundY + 150, 300, 10);
        }

        // REVISI: SPEED LINES TIPIS-TIPIS
        ctx.strokeStyle = "rgba(255, 255, 255, 0.4)";
        ctx.lineWidth = 3;
        for(let i=0; i<12; i++) {
            let lx = (Date.now() * (gameSpeed/2.5) + (i * 350)) % (canvas.width + 600) - 300;
            let ly = player.groundY + 50 + (i * 20);
            ctx.beginPath();
            ctx.moveTo(lx, ly);
            ctx.lineTo(lx - 120, ly);
            ctx.stroke();
        }

        // SHADOW KECIL BLURRED
        let shadowBaseWidth = 90 * player.scaleX;
        let shadowAlpha = player.onGround ? 0.5 : 0.2;
        if (!player.onGround) {
            let heightFactor = Math.max(0.1, 1 - (player.groundY - (player.y + player.h - player.visualOffsetY)) / 800);
            shadowBaseWidth *= heightFactor;
            shadowAlpha *= heightFactor;
        }
        ctx.save();
        ctx.shadowBlur = 10;
        ctx.shadowColor = "rgba(0, 0, 0, 0.5)";
        ctx.fillStyle = `rgba(0, 0, 0, ${shadowAlpha})`;
        ctx.beginPath();
        ctx.ellipse(player.x + player.w/2, player.groundY + 10, shadowBaseWidth, 12, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // DRAW OGRE
        ctx.save();
        ctx.translate(player.x + player.w / 2, player.y + player.h - player.visualOffsetY);
        ctx.scale(player.scaleX, player.scaleY);
        const currentImg = ogreImages[player.frame];
        if (currentImg) {
            ctx.imageSmoothingEnabled = true;
            ctx.drawImage(currentImg, -player.w / 2, -player.h + player.visualOffsetY, player.w, player.h);
        }
        ctx.restore();
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    const handleJump = (e) => {
        if (e.type === 'touchstart') e.preventDefault();
        if (player.onGround) {
            player.dy = player.jumpForce;
            player.scaleX = 0.88; player.scaleY = 1.12;
            player.onGround = false;
        }
    };

    window.addEventListener('mousedown', handleJump);
    window.addEventListener('touchstart', handleJump, { passive: false });

    loadAssets();
</script>
</body>
</html>
